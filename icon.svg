<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6f0"/>
      <stop offset="100%" style="stop-color:#f0e8d8"/>
    </linearGradient>
  </defs>

  <!-- background rounded rect -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- subtle inner shadow border -->
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="#e8dfd0" stroke-width="6"/>

  <!-- notebook / planner body -->
  <rect x="120" y="96" width="272" height="340" rx="18" ry="18" fill="#fffdf9" stroke="#d8ccbb" stroke-width="5"/>

  <!-- spine accent -->
  <rect x="120" y="96" width="36" height="340" rx="18" ry="18" fill="#e8dfd0"/>
  <rect x="138" y="96" width="18" height="340" fill="#e8dfd0"/>

  <!-- binding dots -->
  <circle cx="147" cy="168" r="9" fill="#c8b99a"/>
  <circle cx="147" cy="256" r="9" fill="#c8b99a"/>
  <circle cx="147" cy="344" r="9" fill="#c8b99a"/>

  <!-- date number area -->
  <rect x="176" y="116" width="196" height="72" rx="10" fill="#f5ede0"/>
  <!-- large date number "P" as serif logotype -->
  <text x="274" y="178" font-family="Georgia, serif" font-size="62" font-weight="bold"
        fill="#2c2416" text-anchor="middle" letter-spacing="-2">P</text>

  <!-- horizontal rule lines -->
  <line x1="176" y1="218" x2="372" y2="218" stroke="#e8dfd0" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="252" x2="340" y2="252" stroke="#e8dfd0" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="286" x2="355" y2="286" stroke="#e8dfd0" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="320" x2="325" y2="320" stroke="#e8dfd0" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="354" x2="360" y2="354" stroke="#e8dfd0" stroke-width="3" stroke-linecap="round"/>

  <!-- small color dot accents (like event chips) -->
  <circle cx="176" cy="252" r="6" fill="#f9a8b4"/>
  <circle cx="176" cy="286" r="6" fill="#93c5fd"/>
  <circle cx="176" cy="320" r="6" fill="#86efac"/>
  <circle cx="176" cy="354" r="6" fill="#fde68a"/>
</svg>
